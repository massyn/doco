<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }}{% else %}Document{% endif %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            color: #24292e;
            margin: 0;
            padding: 2rem 1rem;
            background: #fff;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.25;
        }
        h1 { font-size: 2em;   border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        h3 { font-size: 1.25em; }
        h4 { font-size: 1em; }

        .doc-title {
            font-size: 2.5em;
            margin-top: 0;
            border-bottom: 2px solid #24292e;
        }

        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }

        p { margin: 0.75em 0; }

        code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.875em;
            background: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }

        pre {
            background: #f6f8fa;
            border: 1px solid #eaecef;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            line-height: 1.45;
        }

        pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 0.875em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            outline: 1px solid #c8ccd0;
        }
        th, td {
            border: 1px solid #c8ccd0;
            padding: 0.5em 1em;
            text-align: left;
        }
        th { background: #f0f3f6; font-weight: 600; }
        tr:nth-child(even) td { background: #fafbfc; }

        blockquote {
            margin: 1em 0;
            padding: 0.5em 1em;
            border-left: 4px solid #dfe2e5;
            color: #6a737d;
        }
        blockquote p { margin: 0; }

        img { max-width: 100%; height: auto; }

        ul, ol { padding-left: 1.5em; margin: 0.75em 0; }
        li { margin: 0.25em 0; }

        hr, .section-divider {
            border: none;
            border-top: 1px solid #eaecef;
            margin: 3rem 0;
        }

        /* Table of Contents */
        .toc-block {
            background: #f6f8fa;
            border: 1px solid #eaecef;
            border-radius: 6px;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0 2.5rem;
            display: inline-block;
            min-width: 260px;
        }
        .toc-block .toc-heading {
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a737d;
            margin: 0 0 0.5rem;
        }
        .toc-block ul {
            margin: 0;
            padding-left: 1.25em;
            list-style: none;
        }
        .toc-block ul ul { padding-left: 1em; }
        .toc-block li { margin: 0.2em 0; }
        .toc-block a { color: #0366d6; font-size: 0.9em; }

        /* Mermaid diagrams */
        .mermaid {
            text-align: center;
            margin: 1.5em 0;
        }
    </style>
    {% if has_mermaid %}
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'default' });</script>
    {% endif %}
</head>
<body>
    <div class="container">

        {% if title %}
        <h1 class="doc-title">{{ title }}</h1>
        {% endif %}

        {% if toc_html %}
        <nav class="toc-block" aria-label="Table of contents">
            <p class="toc-heading">Contents</p>
            {{ toc_html | safe }}
        </nav>
        {% endif %}

        <main>
            {% for path, body in sections %}
                {% if not loop.first %}
                <hr class="section-divider">
                {% endif %}
                <section>{{ body | safe }}</section>
            {% endfor %}
        </main>

    </div>
</body>
</html>
