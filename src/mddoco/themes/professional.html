<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }}{% else %}Document{% endif %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary:  #1a3a5c;
            --accent:   #2d6cbe;
            --accent-light: #e8f0fb;
            --border:   #b0bec5;
            --muted:    #546e7a;
            --bg:       #ffffff;
            --bg-alt:   #f4f6f8;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            line-height: 1.75;
            color: #263238;
            margin: 0;
            padding: 0;
            background: var(--bg-alt);
        }

        .page-wrap {
            max-width: 900px;
            margin: 2rem auto;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ── Title banner ─────────────────────────────────────────── */
        .doc-header {
            background: var(--primary);
            color: #fff;
            padding: 2.5rem 3rem 2rem;
            border-radius: 4px 4px 0 0;
        }
        .doc-header .doc-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin: 0;
            color: #fff;
            border: none;
        }
        .doc-header .doc-subtitle {
            margin: 0.4rem 0 0;
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.03em;
        }

        .content {
            padding: 2rem 3rem 3rem;
        }

        /* ── Headings ──────────────────────────────────────────────── */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            line-height: 1.25;
            margin-top: 2em;
            margin-bottom: 0.5em;
        }
        h1 {
            font-size: 1.75em;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 0.35em;
        }
        h2 {
            font-size: 1.35em;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.25em;
        }
        h3 { font-size: 1.1em;  color: var(--primary); }
        h4 { font-size: 1em;    color: var(--muted); }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        p { margin: 0.75em 0; }

        /* ── Code ──────────────────────────────────────────────────── */
        code {
            font-family: 'Cascadia Code', 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            padding: 0.15em 0.4em;
            border-radius: 3px;
        }
        pre {
            background: #1e2a38;
            border-radius: 4px;
            padding: 1.25rem;
            overflow-x: auto;
            line-height: 1.5;
        }
        pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.875em;
            color: #cdd9e5;
        }

        /* ── Tables ────────────────────────────────────────────────── */
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.25em 0;
            outline: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        th {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            padding: 0.6em 1em;
            text-align: left;
            border: 1px solid #2a4f78;
        }
        td {
            padding: 0.55em 1em;
            border: 1px solid var(--border);
        }
        tr:nth-child(even) td { background: var(--accent-light); }
        tr:hover td { background: #dde8f7; }

        /* ── Blockquote ────────────────────────────────────────────── */
        blockquote {
            margin: 1em 0;
            padding: 0.75em 1.25em;
            border-left: 4px solid var(--accent);
            background: var(--accent-light);
            color: var(--muted);
            border-radius: 0 4px 4px 0;
        }
        blockquote p { margin: 0; }

        img { max-width: 100%; height: auto; }

        ul, ol { padding-left: 1.5em; margin: 0.75em 0; }
        li { margin: 0.3em 0; }

        hr, .section-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* ── Table of Contents ─────────────────────────────────────── */
        .toc-block {
            background: var(--accent-light);
            border: 1px solid #b3c8ee;
            border-left: 4px solid var(--accent);
            border-radius: 0 4px 4px 0;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0 2.5rem;
            display: inline-block;
            min-width: 280px;
        }
        .toc-block .toc-heading {
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin: 0 0 0.5rem;
        }
        .toc-block ul {
            margin: 0;
            padding-left: 1.25em;
            list-style: none;
        }
        .toc-block ul ul { padding-left: 1em; }
        .toc-block li { margin: 0.2em 0; }
        .toc-block a { color: var(--primary); font-size: 0.9em; }
        .toc-block a:hover { color: var(--accent); }

        /* ── Mermaid ───────────────────────────────────────────────── */
        .mermaid { text-align: center; margin: 1.5em 0; }
    </style>
    {% if has_mermaid %}
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'neutral' });</script>
    {% endif %}
</head>
<body>
    <div class="page-wrap">

        {% if title %}
        <header class="doc-header">
            <h1 class="doc-title">{{ title }}</h1>
            <p class="doc-subtitle">Generated by mddoco</p>
        </header>
        {% endif %}

        <div class="content">

            {% if toc_html %}
            <nav class="toc-block" aria-label="Table of contents">
                <p class="toc-heading">Contents</p>
                {{ toc_html | safe }}
            </nav>
            {% endif %}

            <main>
                {% for path, body in sections %}
                    {% if not loop.first %}
                    <hr class="section-divider">
                    {% endif %}
                    <section>{{ body | safe }}</section>
                {% endfor %}
            </main>

        </div>
    </div>
</body>
</html>
