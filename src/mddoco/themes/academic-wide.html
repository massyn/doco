<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }}{% else %}Document{% endif %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 17px;
            line-height: 1.8;
            color: #111;
            margin: 0;
            padding: 3rem 1rem;
            background: #fff;
        }

        .container {
            width: 100%;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: 700;
            line-height: 1.3;
            margin-top: 2em;
            margin-bottom: 0.5em;
            color: #111;
        }
        h1 { font-size: 2em;    text-align: center; margin-top: 0; border-bottom: 2px solid #111; padding-bottom: 0.4em; }
        h2 { font-size: 1.4em;  border-bottom: 1px solid #ccc; padding-bottom: 0.2em; }
        h3 { font-size: 1.15em; font-style: italic; }
        h4 { font-size: 1em;    font-weight: 700; }

        .doc-title {
            font-size: 2.2em;
            text-align: center;
            margin-top: 0;
            margin-bottom: 0.25em;
            border: none;
            border-bottom: none;
            font-variant: small-caps;
            letter-spacing: 0.04em;
        }

        .title-rule {
            border: none;
            border-top: 3px double #111;
            margin: 0.5rem auto 2rem;
            width: 60%;
        }

        a { color: #111; text-decoration: underline; }
        a:hover { color: #444; }

        p { margin: 0.75em 0; text-align: justify; }

        code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.875em;
            background: #f5f5f5;
            padding: 0.15em 0.35em;
            border: 1px solid #ddd;
            border-radius: 2px;
        }

        pre {
            background: #f8f8f8;
            border: 1px solid #ccc;
            border-left: 4px solid #999;
            padding: 1rem 1.25rem;
            overflow-x: auto;
            line-height: 1.5;
            margin: 1.25em 0;
        }

        pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.875em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5em auto;
            font-size: 0.95em;
        }
        th, td {
            border: 1px solid #999;
            padding: 0.45em 0.9em;
            text-align: left;
        }
        th { background: #eee; font-weight: 700; }
        tr:nth-child(even) td { background: #fafafa; }

        blockquote {
            margin: 1.25em 2em;
            padding: 0;
            border-left: none;
            font-style: italic;
            color: #333;
        }
        blockquote p { margin: 0; }

        img { max-width: 100%; height: auto; display: block; margin: 1em auto; }

        ul, ol { padding-left: 2em; margin: 0.75em 0; }
        li { margin: 0.3em 0; }

        hr, .section-divider {
            border: none;
            border-top: 1px solid #bbb;
            margin: 3rem auto;
            width: 50%;
        }

        /* Table of Contents */
        .toc-block {
            border: 1px solid #ccc;
            padding: 1rem 1.5rem;
            margin: 1.5rem auto 2.5rem;
            display: table;
            min-width: 260px;
            font-size: 0.95em;
        }
        .toc-block .toc-heading {
            font-size: 0.85em;
            font-weight: 700;
            font-variant: small-caps;
            letter-spacing: 0.06em;
            color: #333;
            margin: 0 0 0.5rem;
            text-align: center;
        }
        .toc-block ul {
            margin: 0;
            padding-left: 1.25em;
            list-style: none;
        }
        .toc-block ul ul { padding-left: 1em; }
        .toc-block li { margin: 0.2em 0; }
        .toc-block a { color: #111; font-size: 0.9em; text-decoration: none; }
        .toc-block a:hover { text-decoration: underline; }

        /* Mermaid diagrams */
        .mermaid {
            text-align: center;
            margin: 1.5em 0;
        }

        @media print {
            body { padding: 0; font-size: 12pt; }
            .container { width: 100%; }
            a { color: #000; text-decoration: none; }
            pre { page-break-inside: avoid; }
            h2, h3 { page-break-after: avoid; }
        }
    </style>
    {% if has_mermaid %}
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'neutral' });</script>
    {% endif %}
</head>
<body>
    <div class="container">

        {% if title %}
        <h1 class="doc-title">{{ title }}</h1>
        <hr class="title-rule">
        {% endif %}

        {% if toc_html %}
        <nav class="toc-block" aria-label="Table of contents">
            <p class="toc-heading">Contents</p>
            {{ toc_html | safe }}
        </nav>
        {% endif %}

        <main>
            {% for path, body in sections %}
                {% if not loop.first %}
                <hr class="section-divider">
                {% endif %}
                <section>{{ body | safe }}</section>
            {% endfor %}
        </main>

    </div>
</body>
</html>
